<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora iPhone</title>
<style>
body { font-family: Arial; background:#111; color:#eee; }
.container { max-width:1200px; margin:auto; padding:20px; }
input { padding:8px; margin:5px; }
table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #333; padding:8px; text-align:center; }
th { background:#222; }
.green { color:#00ff88; }
.yellow { color:#ffd000; }
.red { color:#ff4d4d; }
</style>
</head>
<body>
<div class="container">
<h2>Calculadora de Precios</h2>

<label>Dólar: </label>
<input type="number" id="dolar" step="0.01">

<label>Ganancia (USD): </label>
<input type="number" id="ganancia" step="0.01">

<table>
<thead>
<tr>
<th>Modelo</th>
<th>GB</th>
<th>Color</th>
<th>Batería</th>
<th>Base USD</th>
<th>Final USD</th>
<th>Precio ARS</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1khFdbRuruEomajgpWX8TQ3G30A2i0-BGKo7Zlw-THA8/export?format=csv&gid=0";

const dolarInput = document.getElementById("dolar");
const gananciaInput = document.getElementById("ganancia");

// cargar valores guardados

dolarInput.value = localStorage.getItem("dolar") || "";
gananciaInput.value = localStorage.getItem("ganancia") || "";

function guardarYActualizar(){
  localStorage.setItem("dolar", dolarInput.value);
  localStorage.setItem("ganancia", gananciaInput.value);
  cargar();
}

dolarInput.addEventListener("input", guardarYActualizar);
gananciaInput.addEventListener("input", guardarYActualizar);

function limpiarNumero(valor){
  if(!valor) return 0;

  let v = valor.toString()
    .replace(/USD/gi, "")
    .replace(/\$/g, "")
    .trim();

  // manejar formatos tipo 300,00 o 1.200,50
  if(v.includes(",")){
    v = v.replace(/\./g, ""); // quitar miles
    v = v.replace(",", "."); // coma decimal -> punto
  }

  return Math.floor(parseFloat(v)) || 0;
}

async function cargar(){
  const res = await fetch(CSV_URL);
  const text = await res.text();

  const filas = text.split("\n").map(f => f.split(","));

  const headerIndex = filas.findIndex(f => f.includes("Modelo"));
  const data = filas.slice(headerIndex + 1);

  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  const dolar = parseFloat(dolarInput.value) || 0;
  const ganancia = parseFloat(gananciaInput.value) || 0;

  data.forEach(f => {
    if(!f[0]) return;

    const modelo = f[0];
    const gb = f[1];
    const color = f[2];
    const bateria = parseInt(f[3]) || 0;

    const precioUSD = limpiarNumero(f[5]);
    const finalUSD = precioUSD + ganancia;
    const precioARS = finalUSD * dolar;

    const clase = bateria > 85 ? "green" : bateria >= 80 ? "yellow" : "red";

    tbody.innerHTML += `
    <tr>
      <td>${modelo}</td>
      <td>${gb}</td>
      <td>${color}</td>
      <td class="${clase}">${bateria}%</td>
      <td>$${precioUSD}</td>
      <td>$${finalUSD}</td>
      <td>$${precioARS.toLocaleString()}</td>
    </tr>`;
  });
}

cargar();
</script>
</body>
</html>
