<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NicPhones</title>

<style>
:root{
  --card:#171a21;
  --line:#2b3140;
  --text:#f2f4f8;
  --muted:#9ca3af;
  --green:#00ff88;
  --yellow:#ffd000;
  --red:#ff4d4d;
}

*{ box-sizing:border-box; }
html{ scroll-behavior:smooth; }

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0b0d12,#151924);
  color:var(--text);
}

.container{
  max-width:1300px;
  margin:auto;
  padding:22px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  margin-bottom:18px;
}

h2{
  margin:0;
  font-size:34px;
  letter-spacing:.5px;
}

.subtitulo{
  color:var(--muted);
  font-size:14px;
  margin-top:4px;
}

.panel{
  background:rgba(23,26,33,.9);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  margin-bottom:18px;
}

.controls{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:12px;
  align-items:end;
}

.field label{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#0d1017;
  color:var(--text);
  outline:none;
  font-size:15px;
}

input:focus{
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(0,255,136,.12);
}

button{
  padding:12px 14px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  background:var(--green);
  color:#07120c;
  transition:.15s ease;
}

button:hover{
  transform:translateY(-1px);
  background:#20ffa0;
}

button.secondary{
  background:#2a3140;
  color:var(--text);
  border:1px solid var(--line);
}

button.secondary:hover{ background:#343c4d; }

.status{
  margin-top:12px;
  font-size:13px;
  color:var(--muted);
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:8px;
  background:#252b38;
  color:var(--muted);
  font-size:12px;
}

.table-wrap{
  overflow:auto;
  border-radius:18px;
  border:1px solid var(--line);
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  max-height:75vh;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  background:var(--card);
  min-width:950px;
}

th,td{
  border-bottom:1px solid var(--line);
  padding:10px;
  text-align:center;
}

th{
  position:sticky;
  top:0;
  z-index:50;
  background:#0b111d;
  color:#fff;
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:.4px;
  box-shadow:0 2px 0 var(--line), 0 8px 18px rgba(0,0,0,.35);
}

tr:hover td{ background:#1b202b; }
.base-price{ color:var(--muted); }
.final-usd{ color:var(--green); font-weight:bold; }
.price-ars{ font-weight:bold; font-size:16px; color:var(--green); }
.green{ color:var(--green); font-weight:bold; }
.yellow{ color:var(--yellow); font-weight:bold; }
.red{ color:var(--red); font-weight:bold; }

.color-pill{
  display:inline-block;
  min-width:110px;
  padding:4px 10px;
  border-radius:999px;
  font-weight:bold;
  text-align:center;
  border:1px solid rgba(255,255,255,.18);
  box-shadow:inset 0 -8px 18px rgba(0,0,0,.15);
  font-size:12px;
}

.color-dark{ background:#333; color:white; }
.color-blue{ background:#0b5ca8; color:white; }
.color-pink{ background:#ffc9c9; color:#d60000; }
.color-white{ background:#f1f1f1; color:#111; }
.color-silver{ background:#d8d8d8; color:#111; }
.color-gold{ background:#d8b66b; color:#111; }
.color-green-pill{ background:#9fc7a9; color:#102015; }
.color-purple{ background:#b5a0e8; color:#160b33; }
.color-red-pill{ background:#c62828; color:white; }
.color-natural{ background:#c8c2b7; color:#111; }
.color-titanium-blue{ background:#1f6171; color:white; }
.color-titanium-black{ background:#333; color:white; }
.color-titanium-white{ background:#e7e7e2; color:#111; }
.color-default{ background:#444; color:white; }

.back-top{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:100;
  border-radius:999px;
  padding:12px 15px;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
}

body.hide-base-usd .baseUsdCol{
  display:none !important;
}

@media(max-width:700px){
  .container{ padding:10px 8px; }
  h2{ font-size:27px; }
  .header{ align-items:flex-start; }
  .controls{ grid-template-columns:1fr; gap:10px; }
  input{ padding:10px 11px; font-size:14px; }
  button{ width:100%; padding:10px 12px; }
  .panel{ padding:13px; border-radius:16px; margin-bottom:14px; }

  .table-wrap{
    max-height:72vh;
    overflow:auto;
    border-radius:12px;
    width:100%;
  }

  table{
    min-width:0;
    width:100%;
    table-layout:fixed;
  }

  thead{ display:table-header-group; }
  tbody{ display:table-row-group; }
  tr{ display:table-row; }

  th,td{
    display:table-cell;
    padding:6px 3px;
    font-size:10px;
    line-height:1.1;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    vertical-align:middle;
  }

  th{
    position:sticky;
    top:0;
    z-index:60;
    font-size:9px;
    letter-spacing:0;
    padding:7px 2px;
  }

  th:nth-child(5),
  th:nth-child(6){
    font-size:0;
  }

  th:nth-child(5)::after,
  th:nth-child(6)::after{
    font-size:9px;
  }

  th:nth-child(5)::after{ content:"BASE"; }
  th:nth-child(6)::after{ content:"USD"; }

  td::before{ display:none; }

  th:nth-child(1), td:nth-child(1){ width:16%; text-align:left; padding-left:8px; }
  th:nth-child(2), td:nth-child(2){ width:21%; }
  th:nth-child(3), td:nth-child(3){ width:7%; }
  th:nth-child(4), td:nth-child(4){ width:9%; }
  th:nth-child(5), td:nth-child(5){ width:13%; }
  th:nth-child(6), td:nth-child(6){ width:13%; }
  th:nth-child(7), td:nth-child(7){ width:21%; text-align:right; padding-right:8px; }

  body.hide-base-usd th:nth-child(1),
  body.hide-base-usd td:nth-child(1){ width:16%; }

  body.hide-base-usd th:nth-child(2),
  body.hide-base-usd td:nth-child(2){ width:33%; }

  body.hide-base-usd th:nth-child(3),
  body.hide-base-usd td:nth-child(3){ width:8%; }

  body.hide-base-usd th:nth-child(4),
  body.hide-base-usd td:nth-child(4){ width:13%; }

  body.hide-base-usd th:nth-child(6),
  body.hide-base-usd td:nth-child(6){ width:12%; text-align:right; padding-right:2px; }

  body.hide-base-usd th:nth-child(7),
  body.hide-base-usd td:nth-child(7){ width:18%; text-align:right; padding-right:8px; }

  td[data-label="MODELO"] strong{
    display:block;
    font-size:10.5px;
    font-weight:800;
    letter-spacing:0;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .color-pill{
    min-width:0;
    width:min(100%, 92px);
    max-width:92px;
    padding:3px 4px;
    margin:0 auto;
    font-size:8px;
    line-height:1.05;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  body.hide-base-usd .color-pill{
    width:min(100%, 126px);
    max-width:126px;
  }

  .badge{
    font-size:10px;
    padding:3px 5px;
  }

  .base-price,
  .final-usd,
  .price-ars{
    font-size:10.5px;
    font-weight:800;
  }

  .price-ars{
    color:var(--green);
    font-size:11px;
  }

  .back-top{
    right:12px;
    bottom:12px;
    width:42px;
    height:42px;
    padding:0;
    font-size:0;
    opacity:.9;
  }

  .back-top::before{
    content:"â†‘";
    font-size:20px;
    line-height:42px;
  }
}
</style>
</head>

<body>
<div class="container" id="top">
  <div class="header">
    <div>
      <h2>NicPhones</h2>
      <div class="subtitulo">Calculadora de precios con stock actualizado</div>
    </div>
    <span class="badge">Proveedor online</span>
  </div>

  <div class="panel">
    <div class="controls">
      <div class="field">
        <label>Dolar</label>
        <input type="number" id="dolar" placeholder="Ej: 1250">
      </div>

      <div class="field">
        <label>Ganancia (USD)</label>
        <input type="number" id="ganancia" placeholder="Ej: 40">
      </div>

      <button id="calcularBtn">Calcular</button>
      <button id="toggleBaseBtn" class="secondary">Ocultar Base USD</button>
    </div>

    <div class="controls" style="margin-top:12px;">
      <div class="field">
        <label>Buscar equipo</label>
        <input type="text" id="busqueda" placeholder="Ej: 13 blue 128">
      </div>
      <button id="buscarBtn" class="secondary">Buscar</button>
    </div>

    <div class="status" id="status">Esperando accion</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>MODELO</th>
          <th>COLOR</th>
          <th>GB</th>
          <th>BATERIA</th>
          <th class="baseUsdCol">BASE USD</th>
          <th>USD FINAL</th>
          <th>PESOS</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>
</div>

<button id="backTopBtn" class="back-top secondary">Arriba</button>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1khFdbRuruEomajgpWX8TQ3G30A2i0-BGKo7Zlw-THA8/export?format=csv&gid=0";
const CONFIG_URL = "https://docs.google.com/spreadsheets/d/1WDvG9oA0WTwzwBdeSMAt1kTvWn3UQUYkAXbA6jutvDE/export?format=csv&gid=0";
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbygia2T_Hbh9H9AkCK_IEykgwSSxBoGysdj-y6BsDHaT2PKYu5iBRx14Ea1ign8MU23/exec";

const dolarInput = document.getElementById("dolar");
const gananciaInput = document.getElementById("ganancia");
const status = document.getElementById("status");
const btn = document.getElementById("calcularBtn");
const busquedaInput = document.getElementById("busqueda");
const buscarBtn = document.getElementById("buscarBtn");
const toggleBaseBtn = document.getElementById("toggleBaseBtn");
const backTopBtn = document.getElementById("backTopBtn");

let baseVisible = localStorage.getItem("baseVisible");
if(baseVisible === null) baseVisible = "true";

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let insideQuotes = false;

  for(let i = 0; i < text.length; i++){
    const char = text[i];
    const next = text[i + 1];

    if(char === '"' && insideQuotes && next === '"'){
      cell += '"';
      i++;
    }else if(char === '"'){
      insideQuotes = !insideQuotes;
    }else if(char === "," && !insideQuotes){
      row.push(cell);
      cell = "";
    }else if((char === "\n" || char === "\r") && !insideQuotes){
      if(char === "\r" && next === "\n") i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    }else{
      cell += char;
    }
  }

  row.push(cell);
  rows.push(row);
  return rows;
}

function normalizarTexto(texto){
  return (texto || "")
    .toString()
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function modeloCorto(modelo){
  return (modelo || "")
    .toString()
    .replace(/^\s*iphone\s+/i, "")
    .trim();
}

function limpiarNumero(valor){
  if(!valor) return 0;

  let v = valor.toString()
    .replace(/USD/gi, "")
    .replace(/\$/g, "")
    .replace(/\s/g, "")
    .trim();

  if(/^\d{1,3}(,\d{3})+$/.test(v)){
    v = v.replace(/,/g, "");
  }else if(v.includes(",")){
    v = v.replace(/\./g, "");
    v = v.replace(",", ".");
  }

  return Math.floor(parseFloat(v)) || 0;
}

function claseColor(color){
  const c = normalizarTexto(color);

  if(c.includes("blue titanium")) return "color-titanium-blue";
  if(c.includes("black titanium")) return "color-titanium-black";
  if(c.includes("white titanium")) return "color-titanium-white";
  if(c.includes("natural")) return "color-natural";
  if(c.includes("midnight") || c.includes("black") || c.includes("graphite")) return "color-dark";
  if(c.includes("blue")) return "color-blue";
  if(c.includes("pink")) return "color-pink";
  if(c.includes("white") || c.includes("starlight")) return "color-white";
  if(c.includes("silver")) return "color-silver";
  if(c.includes("gold")) return "color-gold";
  if(c.includes("green")) return "color-green-pill";
  if(c.includes("purple")) return "color-purple";
  if(c.includes("red")) return "color-red-pill";

  return "color-default";
}

function buscarIndice(headers, opciones, fallback){
  const normalizados = headers.map(h => normalizarTexto(h));

  for(const op of opciones){
    const i = normalizados.findIndex(h => h.includes(op));
    if(i !== -1) return i;
  }

  return fallback;
}

function actualizarBaseUSD(){
  const ocultar = baseVisible !== "true";

  document.querySelectorAll(".baseUsdCol").forEach(col => {
    col.style.display = ocultar ? "none" : "";
  });

  document.body.classList.toggle("hide-base-usd", ocultar);
  toggleBaseBtn.textContent = ocultar ? "Mostrar Base USD" : "Ocultar Base USD";
}

function renderTabla(equipos){
  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  equipos.forEach(eq => {
    tbody.innerHTML += `
      <tr data-search="${eq.search}">
        <td data-label="MODELO"><strong>${modeloCorto(eq.modelo)}</strong></td>
        <td data-label="COLOR"><span class="color-pill ${claseColor(eq.color)}">${eq.color}</span></td>
        <td data-label="GB"><span class="badge">${eq.gb}</span></td>
        <td data-label="BATERIA" class="${eq.claseBateria}">${eq.bateria}%</td>
        <td data-label="BASE USD" class="baseUsdCol base-price">$${eq.precioUSD}</td>
        <td data-label="USD FINAL" class="final-usd">$${eq.finalUSD}</td>
        <td data-label="PESOS" class="price-ars">$${eq.precioARS.toLocaleString()}</td>
      </tr>`;
  });
}

async function cargar(){
  try{
    status.textContent = "Cargando stock...";

    const res = await fetch(CSV_URL + "&t=" + Date.now());
    const text = await res.text();
    const filas = parseCSV(text);

    const headerIndex = filas.findIndex(f =>
      f.some(c => normalizarTexto(c) === "modelo")
    );

    if(headerIndex === -1){
      status.textContent = "No se encontro la tabla del proveedor";
      return;
    }

    const headers = filas[headerIndex];

    const idxModelo = buscarIndice(headers, ["modelo"], 0);
    const idxGB = buscarIndice(headers, ["gb", "almacenamiento", "storage"], 1);
    const idxColor = buscarIndice(headers, ["color"], 2);
    const idxBateria = buscarIndice(headers, ["bateria", "battery"], 3);
    const idxPrecio = buscarIndice(headers, ["precio lista", "precio", "usd", "base"], 5);

    const data = filas.slice(headerIndex + 1);

    const dolar = parseFloat(dolarInput.value) || 0;
    const ganancia = parseFloat(gananciaInput.value) || 0;
    const equipos = [];

    data.forEach(f => {
      const modelo = f[idxModelo] || "";
      if(!modelo.trim()) return;

      const gb = f[idxGB] || "";
      const color = f[idxColor] || "";
      const bateria = parseInt(f[idxBateria]) || 0;
      const precioUSD = limpiarNumero(f[idxPrecio]);
      const finalUSD = precioUSD + ganancia;
      const precioARS = finalUSD * dolar;
      const claseBateria = bateria > 85 ? "green" : bateria >= 80 ? "yellow" : "red";

      equipos.push({
        modelo,
        gb,
        color,
        bateria,
        precioUSD,
        finalUSD,
        precioARS,
        claseBateria,
        search: normalizarTexto(`${modelo} ${modeloCorto(modelo)} ${gb} ${color} ${bateria} ${precioUSD} ${finalUSD} ${precioARS}`)
      });
    });

    renderTabla(equipos);
    actualizarBaseUSD();
    status.textContent = `Stock cargado: ${equipos.length} equipos`;

  }catch(e){
    console.log(e);
    status.textContent = "Error al cargar stock";
  }
}

async function cargarConfig(){
  try{
    const res = await fetch(CONFIG_URL + "&t=" + Date.now());
    const text = await res.text();
    const filas = parseCSV(text);

    filas.forEach(f => {
      const key = normalizarTexto(f[0]);
      const value = (f[1] || "").trim();

      if(key === "dolar") dolarInput.value = value;
      if(key === "ganancia") gananciaInput.value = value;
    });

    if(!dolarInput.value) dolarInput.value = localStorage.getItem("dolar") || "";
    if(!gananciaInput.value) gananciaInput.value = localStorage.getItem("ganancia") || "";

  }catch(e){
    dolarInput.value = localStorage.getItem("dolar") || "";
    gananciaInput.value = localStorage.getItem("ganancia") || "";
  }
}

async function guardarYCalcular(){
  try{
    status.textContent = "Guardando...";

    const url = `${WEBHOOK_URL}?dolar=${encodeURIComponent(dolarInput.value)}&ganancia=${encodeURIComponent(gananciaInput.value)}&t=${Date.now()}`;

    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = url;
    document.body.appendChild(iframe);

    localStorage.setItem("dolar", dolarInput.value);
    localStorage.setItem("ganancia", gananciaInput.value);
    status.textContent = "Guardado enviado";

    setTimeout(() => {
      iframe.remove();
      status.textContent = "Guardado correctamente";
      cargar();
    }, 1500);

  }catch(e){
    status.textContent = "Error al guardar";
  }
}

function buscarFila(){
  const texto = normalizarTexto(busquedaInput.value);
  if(!texto) return;

  const filas = document.querySelectorAll("[data-search]");
  filas.forEach(fila => fila.style.outline = "none");

  for(const fila of filas){
    if((fila.dataset.search || "").includes(texto)){
      fila.scrollIntoView({ behavior:"smooth", block:"center" });
      fila.style.outline = "3px solid #00ff88";
      return;
    }
  }

  status.textContent = "No se encontro ningun resultado";
}

btn.addEventListener("click", guardarYCalcular);
buscarBtn.addEventListener("click", buscarFila);

busquedaInput.addEventListener("keydown", e => {
  if(e.key === "Enter") buscarFila();
});

toggleBaseBtn.addEventListener("click", () => {
  baseVisible = baseVisible === "true" ? "false" : "true";
  localStorage.setItem("baseVisible", baseVisible);
  actualizarBaseUSD();
});

backTopBtn.addEventListener("click", () => {
  window.scrollTo({ top:0, behavior:"smooth" });
});

(async () => {
  await cargarConfig();
  await cargar();
})();
</script>
</body>
</html>
