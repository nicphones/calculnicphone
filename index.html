<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora iPhone</title>

<style>
body { font-family: Arial; background:#111; color:#eee; }
.container { max-width:1200px; margin:auto; padding:20px; }
input { padding:8px; margin:5px; }
table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #333; padding:8px; text-align:center; }
th { background:#222; }
.green { color:#00ff88; }
.yellow { color:#ffd000; }
.red { color:#ff4d4d; }
</style>

</head>
<body>

<div class="container">
<h2>Calculadora de Precios</h2>

<label>Dólar: </label>
<input type="number" id="dolar">

<label>Ganancia (USD): </label>
<input type="number" id="ganancia">

<table>
<thead>
<tr>
<th>Modelo</th>
<th>GB</th>
<th>Color</th>
<th>Batería</th>
<th>Base USD</th>
<th>Final USD</th>
<th>Precio ARS</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<script>

// ================= CONFIG =================
const CSV_URL = "https://docs.google.com/spreadsheets/d/1khFdbRuruEomajgpWX8TQ3G30A2i0-BGKo7Zlw-THA8/export?format=csv&gid=0";

// ⚠️ OPCIONAL (poné tu sheet si querés sincronizar)
const CONFIG_URL = ""; 

const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzck4ZE95joCk0KsnLvd4Hz8yCCL97O09OKFCs6f3PYjnbtcR3gEkQhFLeNOD5J1Rhi/exec";

// ================= INPUTS =================
const dolarInput = document.getElementById("dolar");
const gananciaInput = document.getElementById("ganancia");

// cargar local
dolarInput.value = localStorage.getItem("dolar") || "";
gananciaInput.value = localStorage.getItem("ganancia") || "";

// ================= EVENTOS =================
dolarInput.addEventListener("input", guardarYActualizar);
gananciaInput.addEventListener("input", guardarYActualizar);

// ================= FUNCIONES =================

// limpiar precios correctamente
function limpiarNumero(valor){
  if(!valor) return 0;

  let v = valor.toString()
    .replace(/USD/gi, "")
    .replace(/\$/g, "")
    .trim();

  // miles tipo 1,000
  if (/^\d{1,3}(,\d{3})+$/.test(v)) {
    v = v.replace(/,/g, "");
  }
  // europeo tipo 1.200,50
  else if (v.includes(",")) {
    v = v.replace(/\./g, "");
    v = v.replace(",", ".");
  }

  return Math.floor(parseFloat(v)) || 0;
}

// cargar productos
async function cargar(){
  try{
    const res = await fetch(CSV_URL);
    const text = await res.text();

    const filas = text.split("\n").map(f => f.split(","));

    const headerIndex = filas.findIndex(f => f.includes("Modelo"));
    if(headerIndex === -1) return;

    const data = filas.slice(headerIndex + 1);

    const tbody = document.getElementById("tabla");
    tbody.innerHTML = "";

    const dolar = parseFloat(dolarInput.value) || 0;
    const ganancia = parseFloat(gananciaInput.value) || 0;

    data.forEach(f => {
      if(!f[0]) return;

      const modelo = f[0];
      const gb = f[1];
      const color = f[2];
      const bateria = parseInt(f[3]) || 0;

      const precioUSD = limpiarNumero(f[5]);
      const finalUSD = precioUSD + ganancia;
      const precioARS = finalUSD * dolar;

      const clase = bateria > 85 ? "green" : bateria >= 80 ? "yellow" : "red";

      tbody.innerHTML += `
      <tr>
        <td>${modelo}</td>
        <td>${gb}</td>
        <td>${color}</td>
        <td class="${clase}">${bateria}%</td>
        <td>$${precioUSD}</td>
        <td>$${finalUSD}</td>
        <td>$${precioARS.toLocaleString()}</td>
      </tr>`;
    });

  }catch(e){
    console.log("Error cargando datos:", e);
  }
}

// guardar config local + remoto
async function guardarYActualizar(){
  localStorage.setItem("dolar", dolarInput.value);
  localStorage.setItem("ganancia", gananciaInput.value);

  // guardar remoto (si tenés script)
  if(WEBHOOK_URL){
    try{
      await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          dolar: dolarInput.value,
          ganancia: gananciaInput.value
        })
      });
    }catch(e){
      console.log("No se pudo guardar remoto");
    }
  }

  cargar();
}

// cargar config remota (opcional)
async function cargarConfig(){
  if(!CONFIG_URL) return;

  try{
    const res = await fetch(CONFIG_URL);
    const text = await res.text();
    const filas = text.split("\n").map(f => f.split(","));

    filas.forEach(f => {
      if(f[0] === "dolar") dolarInput.value = f[1];
      if(f[0] === "ganancia") gananciaInput.value = f[1];
    });

  }catch(e){
    console.log("No se pudo cargar config remota");
  }
}

// ================= INIT =================
cargarConfig();
cargar();

</script>

</body>
</html>
