<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NicPhones</title>

<style>
:root{
  --card:#171a21;
  --line:#2b3140;
  --text:#f2f4f8;
  --muted:#9ca3af;
  --green:#00ff88;
  --yellow:#ffd000;
  --red:#ff4d4d;
}

*{ box-sizing:border-box; }
html{ scroll-behavior:smooth; }

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0b0d12,#151924);
  color:var(--text);
}

.container{
  max-width:1300px;
  margin:auto;
  padding:22px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  margin-bottom:18px;
}

h2{
  margin:0;
  font-size:34px;
  letter-spacing:.5px;
}

.subtitulo{
  color:var(--muted);
  font-size:14px;
  margin-top:4px;
}

.panel{
  background:rgba(23,26,33,.9);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  margin-bottom:18px;
}

.controls{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:12px;
  align-items:end;
}

.field label{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#0d1017;
  color:var(--text);
  outline:none;
  font-size:15px;
}

input:focus{
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(0,255,136,.12);
}

button{
  padding:12px 14px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  background:var(--green);
