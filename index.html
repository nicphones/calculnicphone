<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NicPhones</title>

<style>
:root{
  --bg:#0f1115;
  --card:#171a21;
  --card2:#1f2430;
  --line:#2b3140;
  --text:#f2f4f8;
  --muted:#9ca3af;
  --green:#00ff88;
  --green2:#00cc70;
  --yellow:#ffd000;
  --red:#ff4d4d;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:linear-gradient(135deg,#0b0d12,#151924);
  color:var(--text);
}

.container{
  max-width:1250px;
  margin:auto;
  padding:22px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  margin-bottom:18px;
}

h2{
  margin:0;
  font-size:34px;
  letter-spacing:.5px;
}

.subtitulo{
  color:var(--muted);
  font-size:14px;
  margin-top:4px;
}

.panel{
  background:rgba(23,26,33,.9);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  margin-bottom:18px;
}

.controls{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(190px,1fr));
  gap:12px;
  align-items:end;
}

.field label{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#0d1017;
  color:var(--text);
  outline:none;
  font-size:15px;
}

input:focus{
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(0,255,136,.12);
}

button{
  padding:12px 14px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  background:var(--green);
  color:#07120c;
  transition:.15s ease;
}

button:hover{ transform:translateY(-1px); background:#20ffa0; }
button.secondary{ background:#2a3140; color:var(--text); border:1px solid var(--line); }
button.secondary:hover{ background:#343c4d; }

.status{
  margin-top:12px;
  font-size:13px;
  color:var(--muted);
}

.table-wrap{
  overflow:auto;
  border-radius:18px;
  border:1px solid var(--line);
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

table{
  width:100%;
  border-collapse:collapse;
  background:var(--card);
  min-width:850px;
}

th,td{
  border-bottom:1px solid var(--line);
  padding:10px;
  text-align:center;
}

th{
  position:sticky;
  top:0;
  z-index:2;
  background:var(--card2);
  color:#fff;
  font-size:14px;
}

tr:hover td{ background:#1b202b; }

.price-final{
  font-weight:bold;
  color:var(--green);
}

.price-ars{
  font-weight:bold;
  font-size:16px;
}

.green{ color:var(--green); font-weight:bold; }
.yellow{ color:var(--yellow); font-weight:bold; }
.red{ color:var(--red); font-weight:bold; }

.color-pill{
  display:inline-block;
  min-width:150px;
  padding:5px 12px;
  border-radius:999px;
  font-weight:bold;
  text-align:center;
  border:1px solid rgba(255,255,255,.18);
  box-shadow: inset 0 -8px 18px rgba(0,0,0,.15);
}

.color-dark{ background:#333; color:white; }
.color-blue{ background:#0b5ca8; color:white; }
.color-pink{ background:#ffc9c9; color:#d60000; }
.color-white{ background:#f1f1f1; color:#111; }
.color-silver{ background:#d8d8d8; color:#111; }
.color-gold{ background:#d8b66b; color:#111; }
.color-green-pill{ background:#9fc7a9; color:#102015; }
.color-purple{ background:#b5a0e8; color:#160b33; }
.color-red-pill{ background:#c62828; color:white; }
.color-natural{ background:#c8c2b7; color:#111; }
.color-titanium-blue{ background:#1f6171; color:white; }
.color-titanium-black{ background:#333; color:white; }
.color-titanium-white{ background:#e7e7e2; color:#111; }
.color-default{ background:#444; color:white; }

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:8px;
  background:#252b38;
  color:var(--muted);
  font-size:12px;
}

@media(max-width:700px){
  .container{ padding:12px; }
  h2{ font-size:28px; }
  .header{ align-items:flex-start; }
  .controls{ grid-template-columns:1fr; }
  button{ width:100%; }
  .table-wrap{ border:none; box-shadow:none; overflow:visible; }
  table{ min-width:0; background:transparent; }
  thead{ display:none; }
  tbody{ display:block; }
  tr{
    display:block;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    margin-bottom:14px;
    padding:12px;
    box-shadow:0 8px 22px rgba(0,0,0,.22);
  }
  tr:hover td{ background:transparent; }
  td{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    border:none;
    border-bottom:1px solid var(--line);
    padding:9px 4px;
    text-align:right;
    font-size:15px;
  }
  td:last-child{ border-bottom:none; }
  td::before{
    content:attr(data-label);
    color:var(--muted);
    font-size:13px;
    text-align:left;
    flex-shrink:0;
  }
  td[data-label="Modelo"]{
    display:block;
    text-align:left;
    font-size:20px;
    font-weight:bold;
    border-bottom:1px solid var(--line);
    padding-bottom:12px;
  }
  td[data-label="Modelo"]::before{ display:none; }
  .color-pill{ min-width:145px; }
  .price-final{ font-size:17px; }
  .price-ars{ font-size:20px; color:var(--green); }
}
</style>
</head>

<body>
<div class="container">
  <div class="header">
    <div>
      <h2>NicPhones</h2>
      <div class="subtitulo">Calculadora de precios con stock actualizado</div>
    </div>
    <span class="badge">Proveedor online</span>
  </div>

  <div class="panel">
    <div class="controls">
      <div class="field">
        <label>Dólar</label>
        <input type="number" id="dolar" placeholder="Ej: 1250">
      </div>

      <div class="field">
        <label>Ganancia (USD)</label>
        <input type="number" id="ganancia" placeholder="Ej: 40">
      </div>

      <button id="calcularBtn">Calcular</button>
      <button id="toggleBaseBtn" class="secondary">Ocultar Base USD</button>
    </div>

    <div class="controls" style="margin-top:12px;">
      <div class="field">
        <label>Buscar equipo</label>
        <input type="text" id="busqueda" placeholder="Ej: iPhone 13 blue 128">
      </div>
      <button id="buscarBtn" class="secondary">Buscar</button>
    </div>

    <div class="status" id="status">Esperando acción</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Modelo</th>
          <th>GB</th>
          <th>Color</th>
          <th>Batería</th>
          <th class="baseUsdCol">Base USD</th>
          <th>Final USD</th>
          <th>Precio ARS</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1khFdbRuruEomajgpWX8TQ3G30A2i0-BGKo7Zlw-THA8/export?format=csv&gid=0";
const CONFIG_URL = "https://docs.google.com/spreadsheets/d/1WDvG9oA0WTwzwBdeSMAt1kTvWn3UQUYkAXbA6jutvDE/export?format=csv&gid=0";
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbygia2T_Hbh9H9AkCK_IEykgwSSxBoGysdj-y6BsDHaT2PKYu5iBRx14Ea1ign8MU23/exec";

const dolarInput = document.getElementById("dolar");
const gananciaInput = document.getElementById("ganancia");
const status = document.getElementById("status");
const btn = document.getElementById("calcularBtn");
const busquedaInput = document.getElementById("busqueda");
const buscarBtn = document.getElementById("buscarBtn");
const toggleBaseBtn = document.getElementById("toggleBaseBtn");

let baseVisible = localStorage.getItem("baseVisible");
if(baseVisible === null) baseVisible = "true";

function limpiarNumero(valor){
  if(!valor) return 0;

  let v = valor.toString()
    .replace(/USD/gi, "")
    .replace(/\$/g, "")
    .trim();

  if (/^\d{1,3}(,\d{3})+$/.test(v)) {
    v = v.replace(/,/g, "");
  } else if (v.includes(",")) {
    v = v.replace(/\./g, "");
    v = v.replace(",", ".");
  }

  return Math.floor(parseFloat(v)) || 0;
}

function claseColor(color){
  const c = (color || "").toLowerCase().trim();

  if(c.includes("blue titanium")) return "color-titanium-blue";
  if(c.includes("black titanium")) return "color-titanium-black";
  if(c.includes("white titanium")) return "color-titanium-white";
  if(c.includes("natural")) return "color-natural";
  if(c.includes("midnight") || c.includes("black") || c.includes("graphite")) return "color-dark";
  if(c.includes("blue")) return "color-blue";
  if(c.includes("pink")) return "color-pink";
  if(c.includes("white") || c.includes("starlight")) return "color-white";
  if(c.includes("silver")) return "color-silver";
  if(c.includes("gold")) return "color-gold";
  if(c.includes("green")) return "color-green-pill";
  if(c.includes("purple")) return "color-purple";
  if(c.includes("red")) return "color-red-pill";

  return "color-default";
}

function actualizarBaseUSD(){
  const columnas = document.querySelectorAll(".baseUsdCol");

  columnas.forEach(col => {
    col.style.display = baseVisible === "true" ? "" : "none";
  });

  toggleBaseBtn.textContent = baseVisible === "true" ? "Ocultar Base USD" : "Mostrar Base USD";
}

async function cargar(){
  try{
    status.textContent = "Cargando stock...";

    const res = await fetch(CSV_URL + "&t=" + Date.now());
    const text = await res.text();

    const filas = text.split("\n").map(f => f.split(","));
    const headerIndex = filas.findIndex(f => f.includes("Modelo"));
    if(headerIndex === -1){
      status.textContent = "No se encontró la tabla del proveedor";
      return;
    }

    const data = filas.slice(headerIndex + 1);
    const tbody = document.getElementById("tabla");
    tbody.innerHTML = "";

    const dolar = parseFloat(dolarInput.value) || 0;
    const ganancia = parseFloat(gananciaInput.value) || 0;

    let cantidad = 0;

    data.forEach(f => {
      if(!f[0]) return;

      const bateria = parseInt(f[3]) || 0;
      const precioUSD = limpiarNumero(f[5]);
      const finalUSD = precioUSD + ganancia;
      const precioARS = finalUSD * dolar;
      const claseBateria = bateria > 85 ? "green" : bateria >= 80 ? "yellow" : "red";
      const color = f[2] || "";

      tbody.innerHTML += `
      <tr>
        <td data-label="Modelo">${f[0]}</td>
        <td data-label="GB">${f[1]}</td>
        <td data-label="Color"><span class="color-pill ${claseColor(color)}">${color}</span></td>
        <td data-label="Batería" class="${claseBateria}">${bateria}%</td>
        <td data-label="Base USD" class="baseUsdCol">$${precioUSD}</td>
        <td data-label="Final USD" class="price-final">$${finalUSD}</td>
        <td data-label="Precio ARS" class="price-ars">$${precioARS.toLocaleString()}</td>
      </tr>`;

      cantidad++;
    });

    actualizarBaseUSD();
    status.textContent = `Stock cargado: ${cantidad} equipos`;

  }catch(e){
    console.log(e);
    status.textContent = "Error al cargar stock";
  }
}

async function cargarConfig(){
  try{
    const res = await fetch(CONFIG_URL + "&t=" + Date.now());
    const text = await res.text();
    const filas = text.split("\n").map(f => f.split(","));

    filas.forEach(f => {
      const key = (f[0] || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");

      const value = (f[1] || "").trim();

      if(key === "dolar") dolarInput.value = value;
      if(key === "ganancia") gananciaInput.value = value;
    });

    if(!dolarInput.value) dolarInput.value = localStorage.getItem("dolar") || "";
    if(!gananciaInput.value) gananciaInput.value = localStorage.getItem("ganancia") || "";

  }catch(e){
    console.log("Error config", e);
    dolarInput.value = localStorage.getItem("dolar") || "";
    gananciaInput.value = localStorage.getItem("ganancia") || "";
  }
}

async function guardarYCalcular(){
  try{
    status.textContent = "Guardando...";

    const url = `${WEBHOOK_URL}?dolar=${encodeURIComponent(dolarInput.value)}&ganancia=${encodeURIComponent(gananciaInput.value)}&t=${Date.now()}`;

    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = url;
    document.body.appendChild(iframe);

    localStorage.setItem("dolar", dolarInput.value);
    localStorage.setItem("ganancia", gananciaInput.value);

    status.textContent = "Guardado enviado";

    setTimeout(() => {
      iframe.remove();
      status.textContent = "Guardado correctamente";
      cargar();
    }, 1500);

  }catch(e){
    console.log(e);
    status.textContent = "Error al guardar";
  }
}

function buscarFila(){
  const texto = busquedaInput.value.trim().toLowerCase();
  if(!texto) return;

  const filas = document.querySelectorAll("#tabla tr");
  filas.forEach(fila => fila.style.outline = "none");

  for(const fila of filas){
    const contenido = fila.textContent.toLowerCase();

    if(contenido.includes(texto)){
      fila.scrollIntoView({ behavior: "smooth", block: "center" });
      fila.style.outline = "3px solid #00ff88";
      return;
    }
  }

  status.textContent = "No se encontró ningún resultado";
}

btn.addEventListener("click", guardarYCalcular);
buscarBtn.addEventListener("click", buscarFila);

busquedaInput.addEventListener("keydown", function(e){
  if(e.key === "Enter") buscarFila();
});

toggleBaseBtn.addEventListener("click", () => {
  baseVisible = baseVisible === "true" ? "false" : "true";
  localStorage.setItem("baseVisible", baseVisible);
  actualizarBaseUSD();
});

(async () => {
  await cargarConfig();
  await cargar();
})();
</script>
</body>
</html>
