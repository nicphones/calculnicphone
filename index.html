<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora iPhone</title>

<style>
body { font-family: Arial; background:#111; color:#eee; }
.container { max-width:1200px; margin:auto; padding:20px; }
input, button { padding:8px; margin:5px; }
button { background:#00ff88; border:none; cursor:pointer; font-weight:bold; }
table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #333; padding:8px; text-align:center; }
th { background:#222; }
.green { color:#00ff88; }
.yellow { color:#ffd000; }
.red { color:#ff4d4d; }
.status { margin-top:10px; font-size:14px; color:#aaa; }
</style>

</head>
<body>

<div class="container">
<h2>NicPhones</h2>

<label>Dólar: </label>
<input type="number" id="dolar">

<label>Ganancia (USD): </label>
<input type="number" id="ganancia">

<button id="calcularBtn">Calcular</button>

<div class="status" id="status">Esperando acción</div>

<table>
<thead>
<tr>
<th>Modelo</th>
<th>GB</th>
<th>Color</th>
<th>Batería</th>
<th>Base USD</th>
<th>Final USD</th>
<th>Precio ARS</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/1khFdbRuruEomajgpWX8TQ3G30A2i0-BGKo7Zlw-THA8/export?format=csv&gid=0";
const CONFIG_URL = "https://docs.google.com/spreadsheets/d/1WDvG9oA0WTwzwBdeSMAt1kTvWn3UQUYkAXbA6jutvDE/export?format=csv&gid=0";
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbz0ceMvsLdcCxECp3MberPPoFOOc4jdYxHZGWEU2DsXPmmUtauyBL0-9R49dF19NUmd/exec";
  
const dolarInput = document.getElementById("dolar");
const gananciaInput = document.getElementById("ganancia");
const status = document.getElementById("status");
const btn = document.getElementById("calcularBtn");

function limpiarNumero(valor){
  if(!valor) return 0;

  let v = valor.toString()
    .replace(/USD/gi, "")
    .replace(/\$/g, "")
    .trim();

  if (/^\d{1,3}(,\d{3})+$/.test(v)) {
    v = v.replace(/,/g, "");
  } else if (v.includes(",")) {
    v = v.replace(/\./g, "");
    v = v.replace(",", ".");
  }

  return Math.floor(parseFloat(v)) || 0;
}

async function cargar(){
  const res = await fetch(CSV_URL);
  const text = await res.text();

  const filas = text.split("\n").map(f => f.split(","));
  const headerIndex = filas.findIndex(f => f.includes("Modelo"));
  if(headerIndex === -1) return;

  const data = filas.slice(headerIndex + 1);
  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  const dolar = parseFloat(dolarInput.value) || 0;
  const ganancia = parseFloat(gananciaInput.value) || 0;

  data.forEach(f => {
    if(!f[0]) return;

    const bateria = parseInt(f[3]) || 0;
    const precioUSD = limpiarNumero(f[5]);
    const finalUSD = precioUSD + ganancia;
    const precioARS = finalUSD * dolar;

    const clase = bateria > 85 ? "green" : bateria >= 80 ? "yellow" : "red";

    tbody.innerHTML += `
    <tr>
      <td>${f[0]}</td>
      <td>${f[1]}</td>
      <td>${f[2]}</td>
      <td class="${clase}">${bateria}%</td>
      <td>$${precioUSD}</td>
      <td>$${finalUSD}</td>
      <td>$${precioARS.toLocaleString()}</td>
    </tr>`;
  });
}

async function guardarYCalcular(){
  try{
    status.textContent = "Guardando...";

    await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        dolar: dolarInput.value,
        ganancia: gananciaInput.value
      })
    });

    localStorage.setItem("dolar", dolarInput.value);
    localStorage.setItem("ganancia", gananciaInput.value);

    status.textContent = "Guardado correctamente";

    cargar();

  }catch(e){
    status.textContent = "Error al guardar";
  }
}

btn.addEventListener("click", guardarYCalcular);

async function cargarConfig(){
  try{
    const res = await fetch(CONFIG_URL);
    const text = await res.text();
    const filas = text.split("\n").map(f => f.split(","));

    filas.forEach(f => {
      const key = (f[0] || "").trim().toLowerCase();
      const value = (f[1] || "").trim();
    
      if(key === "dolar") dolarInput.value = value;
      if(key === "ganancia") gananciaInput.value = value;
    });
    
  }catch(e){
    console.log("Error config");
  }
}

(async () => {
  await cargarConfig();
  cargar();
})();

</script>

</body>
</html>
